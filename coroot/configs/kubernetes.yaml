# Mihari Collector — Kubernetes DaemonSet
# Two containers per node: eBPF agent + Vector collector
#
# Variables:
#   __INGESTION_URL__ — Your Mihari instance URL
#   __SOURCE_TOKEN__  — Bearer token for authentication
#
# Usage:
#   1. Replace __INGESTION_URL__ and __SOURCE_TOKEN__
#   2. Create the secret: kubectl create secret generic mihari-collector -n mihari --from-literal=source-token=YOUR_TOKEN
#   3. kubectl apply -f kubernetes.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: mihari
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mihari-collector-config
  namespace: mihari
data:
  vector.yaml: |
    api:
      enabled: true
      address: "0.0.0.0:8686"
    sources:
      coroot_metrics:
        type: prometheus_remote_write
        address: "0.0.0.0:9090"
      coroot_traces:
        type: opentelemetry
        grpc:
          address: "0.0.0.0:4317"
        http:
          address: "0.0.0.0:4318"
    transforms:
      metrics_enriched:
        type: remap
        inputs: ["coroot_metrics"]
        source: |
          container_id = get(.tags.container_id) ?? ""
          if container_id != "" {
            clean_name = container_id
            clean_name = replace(clean_name, r'^/docker/', "")
            clean_name = replace(clean_name, r'^/system\.slice/', "")
            clean_name = replace(clean_name, r'\.service$', "")
            clean_name = replace(clean_name, r'\.scope$', "")
            clean_name = replace(clean_name, r'-\d+$', "")
            .tags.service_name = clean_name
          }
      traces_enriched:
        type: remap
        inputs: ["coroot_traces.traces"]
        source: |
          svc = get(.resource."service.name") ?? ""
          if svc != "" {
            clean = svc
            clean = replace(clean, r'^/docker/', "")
            clean = replace(clean, r'^/system\.slice/', "")
            clean = replace(clean, r'\.service$', "")
            clean = replace(clean, r'\.scope$', "")
            clean = replace(clean, r'-\d+$', "")
            .resource."service.name" = clean
          }
    sinks:
      mihari_metrics:
        type: prometheus_remote_write
        inputs: ["metrics_enriched"]
        endpoint: "${INGESTION_URL}/api/prom/v1/write"
        auth:
          strategy: "bearer"
          token: "${SOURCE_TOKEN}"
        batch:
          max_bytes: 1048576
          timeout_secs: 5
      mihari_traces:
        type: http
        inputs: ["traces_enriched"]
        uri: "${INGESTION_URL}/api/otel/v1/traces"
        method: post
        encoding:
          codec: json
        headers:
          Authorization: "Bearer ${SOURCE_TOKEN}"
          Content-Type: "application/json"
        compression: gzip
        batch:
          max_bytes: 1048576
          timeout_secs: 5
---
apiVersion: v1
kind: Secret
metadata:
  name: mihari-collector
  namespace: mihari
type: Opaque
stringData:
  source-token: "__SOURCE_TOKEN__"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mihari-collector
  namespace: mihari
  labels:
    app.kubernetes.io/name: mihari-collector
    app.kubernetes.io/part-of: mihari
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: mihari-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mihari-collector
    spec:
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      serviceAccountName: mihari-collector
      containers:
        # eBPF agent
        - name: ebpf
          image: ghcr.io/coroot/coroot-node-agent:latest
          args:
            - "--cgroupfs-root=/host/sys/fs/cgroup"
            - "--metrics-endpoint=http://127.0.0.1:9090"
            - "--traces-endpoint=http://127.0.0.1:4318"
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 1Gi
          env:
            - name: GOMEMLIMIT
              value: "512MiB"
          volumeMounts:
            - name: sys-kernel-debug
              mountPath: /sys/kernel/debug
            - name: sys-kernel-tracing
              mountPath: /sys/kernel/tracing
            - name: sys-fs-cgroup
              mountPath: /host/sys/fs/cgroup
              readOnly: true
            - name: dockersock
              mountPath: /var/run/docker.sock
              readOnly: true

        # Vector collector
        - name: collector
          image: timberio/vector:0.47.0-distroless-libc
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          env:
            - name: INGESTION_URL
              value: "__INGESTION_URL__"
            - name: SOURCE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mihari-collector
                  key: source-token
            - name: VECTOR_LOG
              value: "info"
          volumeMounts:
            - name: vector-config
              mountPath: /etc/vector/vector.yaml
              subPath: vector.yaml

      volumes:
        - name: sys-kernel-debug
          hostPath:
            path: /sys/kernel/debug
        - name: sys-kernel-tracing
          hostPath:
            path: /sys/kernel/tracing
        - name: sys-fs-cgroup
          hostPath:
            path: /sys/fs/cgroup
        - name: dockersock
          hostPath:
            path: /var/run/docker.sock
        - name: vector-config
          configMap:
            name: mihari-collector-config
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mihari-collector
  namespace: mihari
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mihari-collector
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mihari-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mihari-collector
subjects:
  - kind: ServiceAccount
    name: mihari-collector
    namespace: mihari
