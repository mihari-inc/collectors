# Mihari Vector Configuration - Docker
# Collects Docker container logs and host metrics
#
# Variables (replaced by setup script):
#   __INGESTION_URL__ - Your Mihari instance URL
#   __SOURCE_TOKEN__  - Bearer token for authentication

api:
  enabled: true
  address: "127.0.0.1:8686"

sources:
  mihari_docker_logs:
    type: docker_logs
    docker_host: "unix:///var/run/docker.sock"

  mihari_host_metrics:
    type: host_metrics
    collectors: [cpu, disk, filesystem, load, host, memory, network]
    scrape_interval_secs: 30
    filesystem:
      devices:
        excludes: ["overlay*", "tmpfs", "nsfs"]
      filesystems:
        excludes: ["overlay", "tmpfs", "nsfs"]
      mountpoints:
        excludes: ["/var/lib/docker/*"]

transforms:
  mihari_docker_parser:
    type: remap
    inputs: [mihari_docker_logs]
    source: |
      del(.source_type)
      .dt = del(.timestamp)
      .level = "info"
      # Try to extract level from log message
      level_parsed, level_err = parse_regex(.message, r'(?i)\b(?P<level>ERROR|WARN|WARNING|INFO|DEBUG|CRITICAL|FATAL)\b')
      if level_err == null {
        .level = downcase!(level_parsed.level)
      }
      .service = "docker"
      .host = get_hostname!()
      # Flatten Docker metadata to top level
      .image = del(.image)
      .stream = del(.stream)
      .label = del(.label)

  mihari_metrics_to_logs:
    type: metric_to_log
    inputs: [mihari_host_metrics]

  mihari_metrics_formatter:
    type: remap
    inputs: [mihari_metrics_to_logs]
    source: |
      del(.source_type)
      .dt = del(.timestamp)

sinks:
  mihari_logs_sink:
    type: http
    inputs: [mihari_docker_parser]
    uri: "__INGESTION_URL__/api/v1/ingest/logs"
    method: post
    encoding:
      codec: json
    compression: gzip
    auth:
      strategy: bearer
      token: "__SOURCE_TOKEN__"
    batch:
      max_bytes: 1048576
      timeout_secs: 1

  mihari_metrics_sink:
    type: http
    inputs: [mihari_metrics_formatter]
    uri: "__INGESTION_URL__/api/v1/ingest/metrics"
    method: post
    encoding:
      codec: json
    compression: gzip
    auth:
      strategy: bearer
      token: "__SOURCE_TOKEN__"
    batch:
      max_bytes: 1048576
      timeout_secs: 5
