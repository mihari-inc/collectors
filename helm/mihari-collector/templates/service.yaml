{{- if eq .Values.collector "otel" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mihari-collector.fullname" . }}
  labels:
    {{- include "mihari-collector.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.otel.grpcPort }}
      targetPort: otlp-grpc
      protocol: TCP
      name: otlp-grpc
    - port: {{ .Values.otel.httpPort }}
      targetPort: otlp-http
      protocol: TCP
      name: otlp-http
    - port: {{ .Values.otel.healthCheckPort }}
      targetPort: health
      protocol: TCP
      name: health
  selector:
    {{- include "mihari-collector.selectorLabels" . | nindent 4 }}
{{- end }}
