sync-collectors:
  stage: deploy
  image: alpine:latest
  variables:
    GIT_DEPTH: 0
  only:
    - main
    - tags
  before_script:
    - apk add --no-cache git curl libc6-compat
    - curl -L -o /tmp/splitsh-lite.tar.gz https://github.com/splitsh/lite/releases/download/v1.0.1/lite_linux_amd64.tar.gz
    - tar -xzf /tmp/splitsh-lite.tar.gz -C /usr/local/bin/
    - chmod +x /usr/local/bin/splitsh-lite
  script:
    - SHA=$(splitsh-lite --prefix=collectors/)
    - git remote add github https://${GITHUB_TOKEN}@github.com/mihari-inc/collectors.git || true
    - git push github ${SHA}:refs/heads/main --force
    # Remove GitLab CI file from the GitHub copy
    - git checkout ${SHA}
    - git rm -f .gitlab-ci.yml 2>/dev/null || true
    - |
      if ! git diff --cached --quiet; then
        git -c user.name="CI" -c user.email="ci@mihari.io" commit -m "chore: remove GitLab CI config from public repo"
        git push github HEAD:refs/heads/main --force
      fi
    - git checkout -
    # Push tags
    - |
      for tag in $(git tag -l "collectors-*"); do
        TAG_SHA=$(splitsh-lite --prefix=collectors/ --origin="refs/tags/$tag")
        CLEAN_TAG=$(echo $tag | sed 's/collectors-//')
        git push github ${TAG_SHA}:refs/tags/${CLEAN_TAG} --force
      done